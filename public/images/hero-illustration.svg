<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" fill="none">
  <!-- Warm background glow -->
  <ellipse cx="280" cy="400" rx="240" ry="60" fill="#fde8d0" opacity="0.6"/>

  <!-- Sofa / reading nook -->
  <path d="M120 340 Q120 300 160 300 L400 300 Q440 300 440 340 L440 380 Q440 400 420 400 L140 400 Q120 400 120 380Z" fill="#e8d5c4" stroke="#d4b89c" stroke-width="2"/>
  <path d="M100 340 Q100 320 120 320 L120 400 Q100 400 100 380Z" fill="#dcc7b3" stroke="#d4b89c" stroke-width="2"/>
  <path d="M440 320 Q460 320 460 340 L460 380 Q460 400 440 400 L440 320Z" fill="#dcc7b3" stroke="#d4b89c" stroke-width="2"/>

  <!-- Parent figure -->
  <circle cx="240" cy="260" r="30" fill="#f5dcc3" stroke="#d4a574" stroke-width="2"/>
  <path d="M210 290 Q210 310 220 340 L260 340 Q270 310 270 290Z" fill="#7eb8c9" stroke="#5a9bb0" stroke-width="2"/>
  <!-- Parent hair -->
  <path d="M215 250 Q220 225 240 220 Q260 225 265 250" fill="#5c3d2e" stroke="#4a2f22" stroke-width="1.5"/>

  <!-- Child figure -->
  <circle cx="320" cy="275" r="22" fill="#f5dcc3" stroke="#d4a574" stroke-width="2"/>
  <path d="M300 297 Q298 315 305 340 L335 340 Q342 315 340 297Z" fill="#f4a6b0" stroke="#e08a95" stroke-width="2"/>
  <!-- Child hair -->
  <path d="M302 268 Q305 250 320 247 Q335 250 338 268" fill="#3d2b1f" stroke="#2e1f15" stroke-width="1.5"/>

  <!-- Open book between them -->
  <path d="M255 320 L280 310 L305 320 L305 350 L280 340 L255 350Z" fill="#fffdf5" stroke="#d4b89c" stroke-width="1.5"/>
  <line x1="280" y1="310" x2="280" y2="340" stroke="#e0cdb8" stroke-width="1"/>
  <!-- Book text lines -->
  <line x1="260" y1="328" x2="276" y2="322" stroke="#d4b89c" stroke-width="1" opacity="0.5"/>
  <line x1="262" y1="335" x2="275" y2="330" stroke="#d4b89c" stroke-width="1" opacity="0.5"/>
  <line x1="284" y1="322" x2="300" y2="328" stroke="#d4b89c" stroke-width="1" opacity="0.5"/>
  <line x1="285" y1="330" x2="298" y2="335" stroke="#d4b89c" stroke-width="1" opacity="0.5"/>

  <!-- Magical sparkles rising from the book -->
  <circle cx="270" cy="290" r="3" fill="#ffd166" opacity="0.9">
    <animate attributeName="cy" values="290;260;240" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.5;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="285" r="2.5" fill="#ff9f7f" opacity="0.8">
    <animate attributeName="cy" values="285;250;225" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="295" r="2" fill="#a8d8ea" opacity="0.85">
    <animate attributeName="cy" values="295;265;235" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.45;0" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="280" r="1.8" fill="#c3aed6" opacity="0.7">
    <animate attributeName="cy" values="280;245;215" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.35;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="288" r="2.2" fill="#ffd166" opacity="0.75">
    <animate attributeName="cy" values="288;255;225" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.4;0" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars floating -->
  <polygon points="180,180 183,190 193,190 185,196 188,206 180,200 172,206 175,196 167,190 177,190" fill="#ffd166" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="380,160 382,167 389,167 383,172 385,179 380,175 375,179 377,172 371,167 378,167" fill="#ff9f7f" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="340,200 342,206 348,206 343,210 345,216 340,212 335,216 337,210 332,206 338,206" fill="#a8d8ea" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="1.8s" repeatCount="indefinite"/>
  </polygon>

  <!-- Lamp on the side -->
  <rect x="430" y="250" width="8" height="60" rx="3" fill="#d4b89c"/>
  <path d="M420 250 Q434 230 448 250Z" fill="#ffeaa7"/>
  <ellipse cx="434" cy="245" rx="16" ry="4" fill="#ffeaa7" opacity="0.3"/>
</svg>
