<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <circle cx="32" cy="32" r="28" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
  <!-- Explorer face -->
  <circle cx="32" cy="24" r="10" fill="#f5dcc3" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Wide excited eyes -->
  <circle cx="28" cy="22" r="2.2" fill="#2d1f19"/>
  <circle cx="36" cy="22" r="2.2" fill="#2d1f19"/>
  <circle cx="29" cy="21" r="0.8" fill="#fff"/>
  <circle cx="37" cy="21" r="0.8" fill="#fff"/>
  <!-- Excited open mouth -->
  <ellipse cx="32" cy="28" rx="3" ry="2" fill="#e08a95"/>
  <!-- Explorer hat -->
  <path d="M20 18 Q22 10 32 8 Q42 10 44 18Z" fill="#81c784" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="20" y="17" width="24" height="3" rx="1.5" fill="#4caf50"/>
  <!-- Magnifying glass -->
  <circle cx="48" cy="44" r="6" fill="none" stroke="#5a9bb0" stroke-width="2.5"/>
  <line x1="52" y1="48" x2="56" y2="52" stroke="#5a9bb0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Question mark spark -->
  <text x="16" y="48" font-family="sans-serif" font-weight="900" font-size="14" fill="#ffd166">?</text>
</svg>
